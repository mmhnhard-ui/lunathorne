    .page { max-width: 420px; margin: 0 auto; padding: 40px 24px 60px; display: flex; flex-direction: column; align-items: center; }

    .tagline { font-size: 13px; color: #555; letter-spacing: 0.04em; margin-bottom: 32px; }
    .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .link-btn { display: flex; align-items: center; gap: 14px; width: 100%; padding: 14px 18px; border-radius: 10px; border: 0.5px solid #222; background: #111; color: #d0d0d0; text-decoration: none; font-size: 14px; font-weight: 400; letter-spacing: 0.02em; transition: border-color 0.2s, background 0.2s; }
    .link-btn:hover { border-color: #444; background: #161616; color: #f0f0f0; }
    .link-btn.vip { border: 0.5px solid #2e1f4a; background: #0f0a18; }
    .link-btn.vip:hover { border-color: #4a2f7a; background: #130d20; }
    .link-btn .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon-fanvue { background: #1a1020; border: 0.5px solid #2e1f4a; }
    .icon-tg { background: #0d1a22; border: 0.5px solid #1a3040; }
    .icon-tgvip { background: #1a0d2e; border: 0.5px solid #3d1f6a; }
    .icon-ig { background: #1a1018; border: 0.5px solid #3a1530; }
    .icon-tt { background: #0d1a1a; border: 0.5px solid #103030; }
    .link-label { flex: 1; text-align: left; }
    .link-sub { font-size: 11px; color: #444; display: block; margin-top: 1px; }
    .link-sub.vip { color: #6a3fa0; }
    .badge { font-size: 9px; background: #2e1f4a; color: #b48aff; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.08em; margin-left: 6px; vertical-align: middle; }
    .arrow { color: #333; font-size: 16px; }
    .divider { width: 100%; height: 0.5px; background: #1c1c1c; margin: 4px 0; }
    .section-label { width: 100%; font-size: 10px; color: #333; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
